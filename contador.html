<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiempo faltante para la mango loco jesu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    background: #000000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    padding: 20px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 40px 30px;
    text-align: center;
    max-width: 600px;
    width: 100%;
  }

  h1 {
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 600;
    margin-bottom: 8px;
    color: #ffffff;
  }

  .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 32px;
  }

  .mango-img {
    display: block;
    max-width: 280px;
    width: 100%;
    height: auto;
    margin: 32px auto 8px;
  }

  .timer {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .unit {
    background: rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 18px 16px;
    min-width: 80px;
  }

  .unit .num {
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 700;
    line-height: 1;
    color: #ffffff;
  }

  .unit .label {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .done {
    display: none;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 700;
    color: #ffffff;
    margin-top: 10px;
  }

  .footer {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 20px;
  }
</style>
</head>
<body>

  <div class="card">
    <h1>Tiempo faltante para la mango loco jesu</h1>
    <p class="subtitle">cuenta regresiva hasta el 1 de julio, 00:00 hrs</p>

    <div class="timer" id="display"></div>

    <div class="done" id="done">¡llegó la mango loco jesu! 🥭</div>

    <img src="mango_tigre.png" alt="mango loco jesu" class="mango-img">

    <p class="footer">se actualiza en tiempo real</p>
  </div>

<script>
  // Fecha objetivo: 1 de julio, 00:00 hrs (hora local del dispositivo)
  const target = new Date(2026, 6, 1, 0, 0, 0);

  const container = document.getElementById('display');
  const doneMsg = document.getElementById('done');

  const units = [
    { key: 'dias', label: 'días' },
    { key: 'horas', label: 'horas' },
    { key: 'min', label: 'min' },
    { key: 'seg', label: 'seg' }
  ];

  const boxes = {};

  units.forEach(u => {
    const box = document.createElement('div');
    box.className = 'unit';
    box.innerHTML = `<div class="num" id="n-${u.key}">00</div><div class="label">${u.label}</div>`;
    container.appendChild(box);
    boxes[u.key] = box.querySelector('.num');
  });

  function pad(n) {
    return n.toString().padStart(2, '0');
  }

  let timer;

  function tick() {
    const now = new Date();
    let diff = target - now;

    if (diff <= 0) {
      units.forEach(u => boxes[u.key].textContent = '00');
      doneMsg.style.display = 'block';
      clearInterval(timer);
      return;
    }

    let seconds = Math.floor(diff / 1000);
    const days = Math.floor(seconds / 86400);
    seconds -= days * 86400;
    const hours = Math.floor(seconds / 3600);
    seconds -= hours * 3600;
    const mins = Math.floor(seconds / 60);
    seconds -= mins * 60;

    boxes.dias.textContent = pad(days);
    boxes.horas.textContent = pad(hours);
    boxes.min.textContent = pad(mins);
    boxes.seg.textContent = pad(seconds);
  }

  tick();
  timer = setInterval(tick, 1000);
</script>

</body>
</html>
